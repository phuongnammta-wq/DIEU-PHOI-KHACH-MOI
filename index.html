<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tra cứu ghế khách mời</title>
  <meta name="theme-color" content="#8b0000">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <main class="app">
    <section class="hero">
      <div class="badge">Tra cứu nhanh ghế ngồi</div>
      <h1>Danh sách khách mời</h1>
      <p class="sub">Gõ tên để lọc ngay. Kết quả nổi bật luôn cố định ở trên để tránh nhảy giật khi tìm kiếm.</p>
    </section>

    <section class="result-card" id="resultCard">
      <div class="result-label">Kết quả nổi bật</div>
      <div class="result-seat" id="resultSeat">—</div>
      <div class="result-name" id="resultName">Chưa chọn khách mời</div>
      <div class="result-pos" id="resultPos">Nhập tên bên dưới để lọc danh sách.</div>
    </section>

    <section class="search-card">
      <label for="searchInput" class="search-label">Tìm theo tên khách mời</label>
      <input id="searchInput" type="search" inputmode="search" autocomplete="off" placeholder="Ví dụ: Trần Quang Phương, Tô Lâm, Lê Ngọc Hải..." />
    </section>

    <section class="stats">
      <div>Tổng khách mời: <strong id="totalCount"></strong></div>
      <div>Đang hiển thị: <strong id="showingCount"></strong></div>
    </section>

    <section class="list-card">
      <div class="list-title">Danh sách khách mời</div>
      <div id="guestList" class="guest-list"></div>
    </section>
  </main>
  <script src="guests.js"></script>
  <script src="app.js"></script>
</body>
</html>
