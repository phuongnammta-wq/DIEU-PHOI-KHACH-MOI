<!doctype html>
<html lang='vi'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>Tra cứu ghế khách mời 24.4</title>
  <meta name='theme-color' content='#8b0000'>
  <link rel='manifest' href='manifest.webmanifest'>
  <link rel='stylesheet' href='styles.css'>
</head>
<body>
  <main class='app'>
    <header class='hero'>
      <div class='title-wrap'>
        <p class='eyebrow'>Tra cứu nhanh ghế ngồi</p>
        <h1>Danh sách khách mời 24.4</h1>
      </div>
      <section id='featuredResult' class='featured empty' aria-live='polite'>
        <div class='featured-seat'>Chưa chọn</div>
        <div class='featured-content'>
          <div class='featured-name'>Gõ tên để hiện ghế ngồi ngay tại đây</div>
          <div class='featured-position'>Kết quả sẽ luôn cố định phía trên để không bị nhảy khi tìm kiếm.</div>
        </div>
      </section>
      <label class='search-box'>
        <span class='search-label'>Tìm khách mời</span>
        <input id='searchInput' type='search' placeholder='Gõ tên, chức vụ hoặc ghế...' autocomplete='off' spellcheck='false'>
      </label>
    </header>

    <section class='summary-row'>
      <div class='stat'><span class='stat-label'>Tổng khách mời</span><strong id='totalCount'>0</strong></div>
      <div class='stat'><span class='stat-label'>Đang hiển thị</span><strong id='visibleCount'>0</strong></div>
    </section>

    <section class='list-card'>
      <div class='section-head'>
        <h2>Danh sách khách mời</h2>
      </div>
      <div id='guestList' class='guest-list'></div>
    </section>
  </main>
  <script src='guests.js'></script>
  <script src='app.js'></script>
</body>
</html>
